[build]
  publish = "static"

[[redirects]]
  from = "/simulated-link/*"
  to = "/training.html"
  status = 200

[[redirects]]
  from = "/track/open/*"
  to = "/training.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
